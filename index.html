<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    background: #111;
}

nav a {
    color: white;
    text-decoration: none;
    cursor: pointer;
}

/* SEKCJE */
section {
    display: none;
    padding: 80px 20px;
    text-align: center;
}

/* AKTYWNA SEKCJA */
.active {
    display: block;
}

/* STORE */
.container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: #151515;
    padding: 25px;
    border-radius: 20px;
    width: 250px;
}
</style>
</head>

<body>

<nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('store')">Store</a>
</nav>

<!-- HOME (ZERO PRODUKTÓW) -->
<section id="home" class="active">
    <h1>Home</h1>
    <p>This is homepage. No products here.</p>
</section>

<!-- STORE (TYLKO TU PRODUKTY) -->
<section id="store">
    <h1>Our Products</h1>

    <div class="container">
        <div class="card">
            <h2>Basic</h2>
            <p>$9.99</p>
        </div>

        <div class="card">
            <h2>Pro</h2>
            <p>$19.99</p>
        </div>

        <div class="card">
            <h2>Premium</h2>
            <p>$29.99</p>
        </div>
    </div>
</section>

<script>
function showPage(page) {
    document.getElementById("home").classList.remove("active");
    document.getElementById("store").classList.remove("active");

    document.getElementById(page).classList.add("active");
}
</script>

</body>
</html>
