<!DOCTYPE html>
<html>
<head>
<title>CS2 Store</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', monospace;
    background: #0d0d0d;
    color: white;
    overflow-x: hidden;
    cursor: none;
}

/* TŁO */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover no-repeat;
    filter: blur(8px);
    transform: scale(1.1);
    z-index: -2;
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

/* PANEL */
.panel {
    background: rgba(20,20,20,0.8);
    border-radius: 12px;
    padding: 50px;
    width: 650px;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(0,195,255,0.4);
    box-shadow: 0 0 30px rgba(0,195,255,0.4);
}

/* TEXT */
h1 {
    font-size: 32px;
    text-shadow: 0 0 10px #00c3ff;
    margin-bottom: 20px;
}

h2 {
    font-size: 18px;
    margin: 10px 0;
}

p {
    font-size: 10px;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 2;
}

.left {
    display: flex;
    gap: 10px;
}

/* BUTTONY */
button {
    padding: 8px 12px;
    border: 2px solid #00c3ff;
    border-radius: 4px;
    background: #1a1a1a;
    color: #00c3ff;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #00c3ff;
    color: black;
}

.discord {
    background: linear-gradient(135deg, #5865F2, #404EED);
    border: none;
    color: white;
}

#langBtn {
    margin-right: 10px;
}

/* STRONY */
.page {
    position: absolute;
    top: 60px;
    left: 0;
    width: 100%;
    min-height: calc(100vh - 60px);
    opacity: 0;
    transform: translateX(30px);
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
}

.page.showing {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
    z-index: 2;
}

.home-page {
    display: flex;
    justify-content: center;
    align-items: center;
}

.store-page h1 {
    padding-left: 30px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding-left: 30px;
    margin-top: 20px;
}

.card {
    background: rgba(20,20,20,0.9);
    padding: 20px;
    border-radius: 8px;
    width: 220px;
    border: 2px solid #00c3ff;
}

.buy {
    background: #00c3ff;
    color: black;
}

/* BUY BOX */
#buyBox {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index: 5;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<nav>
    <div class="left">
        <button onclick="showPage('home')">HOME</button>
        <button onclick="showPage('store')">STORE</button>
    </div>
</nav>

<div id="home" class="page showing">
    <div class="panel">
        <h1>CS2 ПРЕМИУМ ЧИТЫ</h1>
        <p>НЕОБНАРУЖИМЫЕ</p>
    </div>
</div>

<div id="store" class="page">
    <h1>НАШИ ПРОДУКТЫ</h1>
    <div class="container">
        <div class="card">
            <h2>GAMESENSE RELEASE</h2>
            <button onclick="openBuy('Gamesense')">КУПИТЬ</button>
        </div>
    </div>
</div>

<div id="buyBox">
    <div>
        <h2 id="productName"></h2>
        <button onclick="buyNow()">КУПИТЬ</button>
    </div>
</div>

<script>
let selectedProduct = "";

function openBuy(name) {
    document.getElementById("buyBox").style.display = "flex";
    document.getElementById("productName").innerText = name;
    selectedProduct = name;
}

function buyNow() {
    window.open("https://buy.stripe.com/test_9B6cN50UcaCN6JS7bW0co00");
}
</script>

</body>
</html>
