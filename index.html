<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: center;
    gap: 40px;
    background: #111;
    padding: 15px;
}

nav button {
    background: none;
    border: none;
    color: #ccc;
    font-size: 16px;
    cursor: pointer;
}

nav button:hover {
    color: #00c3ff;
}

/* SEKCJE */
.page {
    display: none;
    padding: 80px 20px;
    text-align: center;
}

.active {
    display: block;
}

/* STORE */
.container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: #151515;
    padding: 25px;
    border-radius: 15px;
    width: 240px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px rgba(0,195,255,0.5);
}

.price {
    margin: 10px 0;
    font-size: 18px;
}

button.buy {
    background: linear-gradient(135deg, #00c3ff, #0066ff);
    border: none;
    padding: 10px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<nav>
    <button onclick="show('home')">Home</button>
    <button onclick="show('store')">Store</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
    <h1>Premium Digital Store</h1>
    <p>Welcome to a modern digital store with smooth design and fast access.</p>
</div>

<!-- STORE -->
<div id="store" class="page">
    <h1>Our Products</h1>

    <div class="container">
        <div class="card">
            <h2>Basic</h2>
            <p class="price">$9.99</p>
            <button class="buy">Buy</button>
        </div>

        <div class="card">
            <h2>Pro</h2>
            <p class="price">$19.99</p>
            <button class="buy">Buy</button>
        </div>

        <div class="card">
            <h2>Premium</h2>
            <p class="price">$29.99</p>
            <button class="buy">Buy</button>
        </div>
    </div>
</div>

<script>
function show(page) {
    document.getElementById("home").classList.remove("active");
    document.getElementById("store").classList.remove("active");

    document.getElementById(page).classList.add("active");
}
</script>

</body>
</html>
