<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #111;
}

.nav-left, .nav-center, .nav-right {
    display: flex;
    gap: 20px;
}

.nav-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

a {
    color: #ccc;
    text-decoration: none;
    cursor: pointer;
}

a:hover {
    color: #00c3ff;
}

/* SEKCJE */
section {
    padding: 80px 20px;
    text-align: center;
}

/* STORE */
.container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    background: #151515;
    padding: 25px;
    border-radius: 20px;
    width: 250px;
    border: 1px solid rgba(255,255,255,0.05);
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #00c3ff;
    cursor: pointer;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}
</style>
</head>

<body>

<nav>
    <div class="nav-left">
        <a onclick="openLogin()">Login</a>
        <a onclick="openRegister()">Register</a>
    </div>

    <div class="nav-center">
        <a href="#home">Home</a>
        <a href="#store">Store</a>
    </div>

    <div class="nav-right">
        <a href="https://discord.gg/uBkNEQKHX" target="_blank">Discord</a>
    </div>
</nav>

<!-- HOME -->
<section id="home">
    <h1>Premium Digital Store</h1>
    <p>Welcome to a modern digital store with smooth design and fast access.</p>
</section>

<!-- STORE -->
<section id="store">
    <h1>Our Products</h1>

    <div class="container">
        <div class="card">
            <h2>gamesense release</h2>
            <p>$1.99</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <h2>nightware</h2>
            <p>$free</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <h2>nothing</h2>
            <p>$0.00</p>
            <button>Buy</button>
        </div>
    </div>
</section>

<!-- LOGIN -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>Login</h2>
        <input id="loginUser" placeholder="Username">
        <input id="loginPass" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- REGISTER -->
<div class="modal" id="registerModal">
    <div class="modal-content">
        <h2>Register</h2>
        <input id="regUser" placeholder="Username">
        <input id="regPass" type="password" placeholder="Password">
        <button onclick="register()">Register</button>
    </div>
</div>

<script>
// MODALS
function openLogin() {
    document.getElementById("loginModal").style.display = "flex";
}
function openRegister() {
    document.getElementById("registerModal").style.display = "flex";
}
function closeAll() {
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("registerModal").style.display = "none";
}

// REGISTER
function register() {
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    localStorage.setItem("user", user);
    localStorage.setItem("pass", pass);

    alert("Registered!");
    closeAll();
}

// LOGIN
function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let savedUser = localStorage.getItem("user");
    let savedPass = localStorage.getItem("pass");

    if(user === savedUser && pass === savedPass) {
        alert("Login successful!");
        closeAll();
    } else {
        alert("Wrong data!");
    }
}
</script>

</body>
</html>
