<!DOCTYPE html>
<html>
<head>
<title>SourceSense</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #111;
}

/* LEWA */
.left {
    display: flex;
    gap: 15px;
}

/* PRAWA */
.right {
    display: flex;
}

/* PRZYCISKI */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #00c3ff;
    color: white;
    cursor: pointer;
}

/* STRONY */
#home, #store {
    display: none;
    padding: 50px;
    text-align: center;
}

.active {
    display: block;
}
</style>

</head>

<body>

<nav>
    <div class="left">
        <button onclick="showHome()">Home</button>
        <button onclick="showStore()">Store</button>
    </div>

    <div class="right">
        <button onclick="window.open('https://discord.gg/uBkNEQKHX', '_blank')">
            Discord
        </button>
    </div>
</nav>

<!-- HOME -->
<div id="home" class="active">
    <h1>HOME</h1>
    <p>Tu nie ma produktów</p>
</div>

<!-- STORE -->
<div id="store">
    <h1>STORE</h1>
    <p>Basic - $9.99</p>
    <p>Pro - $19.99</p>
</div>

<script>
function showHome() {
    document.getElementById("home").classList.add("active");
    document.getElementById("store").classList.remove("active");
}

function showStore() {
    document.getElementById("store").classList.add("active");
    document.getElementById("home").classList.remove("active");
}
</script>

</body>
</html>
