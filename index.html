<!DOCTYPE html>
<html>
<head>
<title>Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

nav {
    background: #111;
    padding: 15px;
    text-align: center;
}

nav button {
    margin: 5px;
    padding: 10px;
    cursor: pointer;
}

/* strony */
#home, #store {
    display: none;
    padding: 40px;
    text-align: center;
}

.active {
    display: block;
}

/* produkty */
.card {
    background: #222;
    padding: 20px;
    margin: 10px;
}
</style>

</head>

<body>

<nav>
    <button onclick="home()">Home</button>
    <button onclick="store()">Store</button>
</nav>

<!-- HOME -->
<div id="home" class="active">
    <h1>HOME</h1>
    <p>tu NIE MA produktów</p>
</div>

<!-- STORE -->
<div id="store">
    <h1>STORE</h1>

    <div class="card">Basic - $9.99</div>
    <div class="card">Pro - $19.99</div>
    <div class="card">Premium - $29.99</div>

</div>

<script>
function home() {
    document.getElementById("home").classList.add("active");
    document.getElementById("store").classList.remove("active");
}

function store() {
    document.getElementById("store").classList.add("active");
    document.getElementById("home").classList.remove("active");
}
</script>

</body>
</html>
